model:
  default: "moonshotai/kimi-k2.6"
  provider: "openrouter"
  base_url: "https://openrouter.ai/api/v1"

approvals:
  mode: smart
  timeout: 60
  cron_mode: deny

security:
  redact_secrets: true
  tirith_enabled: true
  tirith_fail_open: false
  website_blocklist:
    enabled: true
    domains:
      - "169.254.169.254"
      - "metadata.google.internal"
      - "fd00:ec2::254"

skills:
  guard_agent_created: true   # Q4 対策: agent 自己生成 skill の guard 必須

terminal:
  backend: docker
  docker_image: "hermes-tools:latest"   # #55 で build
  container_persistent: false
  container_memory: 4096
  docker_forward_env:
    - "GIT_AUTHOR_NAME"
    - "GIT_AUTHOR_EMAIL"
    - "GH_TOKEN"
  docker_volumes:
    - "/Users/naramotoyuuji/ghq:/workspace/repos:ro"
    - "/Users/naramotoyuuji/Documents/hermes-out:/workspace/out:rw"
    - "/Users/naramotoyuuji/.config/gws:/root/.config/gws:rw"

agent:
  disabled_toolsets: []

file_read_max_chars: 100000
tool_output:
  max_bytes: 50000
  max_lines: 2000
  max_line_length: 2000

platforms:
  slack:
    reply_to_mode: "first"
    extra:
      reply_in_thread: true
      reply_broadcast: false
      strict_mention: false
