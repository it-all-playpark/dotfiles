[env]
_.file = '.env'

[tools]
node = "lts"
python = "latest"
uv = "latest"
"npm:git-cz" = "latest"
"npm:mcp-hub" = "latest"
"npm:vercel" = "latest"
"codex" = "latest"
"copilot" = "latest"
"npm:wrangler" = "latest"
"npm:mmcp" = "latest"
"npm:tsx" = "latest"
"npm:dotenv-cli" = "latest"
"npm:memvid-cli" = "latest"
"npm:neonctl" = "latest"
"npm:agent-browser" = "latest"
"npm:netlify-cli" = "latest"
"pipx:whisply" = "latest"
"pipx:mlx-whisper" = "latest"
"claude-code" = "latest"
"npm:pnpm" = "latest"
"npm:yarn" = "latest"
rust = "latest"
go = "latest"
java = "21"

[settings]
experimental = true
# 供給網攻撃対策の minimum_release_age (default: 24h) から除外し、リリース即日で追随する。
# いずれも GitHub Releases (aqua) 直取得のためリスク低。npm:* 系は 24h ガードを維持する。
minimum_release_age_excludes = ["claude-code", "codex", "copilot"]
