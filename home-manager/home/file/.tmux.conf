# 設定をリセット（過去の設定を引き継がない）
set -g -a ''

# prefixキーをC-aに変更する
set -g prefix C-a
unbind C-b

# ターミナル設定（true color + undercurl対応）
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-ghostty:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# escapeシーケンス解析時間を短めに設定
set-option -sg escape-time 10
# focusイベントをon
set-option -g focus-events on
# コピーモードでvimキーバインド
setw -g mode-keys vi
# マウス操作を有効化
set -g mouse on

# ウィンドウ番号を1始まりに
set -g base-index 1
setw -g pane-base-index 1
# ウィンドウ番号の自動振り直し
set -g renumber-windows on
# ステータスバーを上部に（タブバーライク）
set -g status-position top

## ペイン（大西配列: t=left, n=down, r=up, s=right）
# 移動
bind -n M-t select-pane -L
bind -n M-n select-pane -D
bind -n M-r select-pane -U
bind -n M-s select-pane -R
# ペイン巡回
bind -n C-o select-pane -t :.+
bind -n C-i select-pane -t :.-
# 分割（prefix）
bind s split-window -h -c "#{pane_current_path}"
bind n split-window -v -c "#{pane_current_path}"
# 分割（prefix不要）
bind -n M-Right split-window -h -c "#{pane_current_path}"
bind -n M-Down split-window -v -c "#{pane_current_path}"
# ペイン削除
bind -n M-q kill-pane
# リサイズ
bind -n C-M-t resize-pane -L 10
bind -n C-M-n resize-pane -D 10
bind -n C-M-r resize-pane -U 10
bind -n C-M-s resize-pane -R 10
# 入替え
bind -n C-] swap-pane -D
bind -n C-[ swap-pane -U
# 最大化トグル
bind -n M-z resize-pane -Z
# アクティブペインを隣のウィンドウに移動
bind -n C-< join-pane -t :-
bind -n C-> join-pane -t :+

## ウィンドウ（タブ操作: 大西配列）
# 切り替え
bind -n M-T previous-window
bind -n M-S next-window
# 新規ウィンドウ
bind -n M-y new-window -c "#{pane_current_path}"
# ウィンドウ削除
bind -n M-Q kill-window

## セッション
bind l choose-tree -s
bind q detach-client

## 設定のリロード
bind r run-shell 'tmux unbind-key -an \; source-file ~/.tmux.conf \; display "Reloaded!"'

# 選択中のペインの境界線を目立たせる
setw -g pane-active-border-style "fg=yellow,bg=yellow"
